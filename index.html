<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rekber Premium - Jual Beli Akun Game Aman</title>
  <link rel="stylesheet" href="style.css" />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />
</head>

<body>
<header class="glass-navbar">
  <div class="container">
    <div class="logo">REKBER PREMIUM</div>
    <nav class="nav-menu">
      <!-- PASTIKAN href benar -->
      <a href="index.html" class="nav-link active">Home</a>
      <a href="rekber.html" class="nav-link">Rekber</a>
      <a href="testi.html" class="nav-link">Testimoni</a>
      <a href="sosial.html" class="nav-link">Sosial</a>
    </nav>
  </div>
</header>

  <section class="hero">
    <div class="hero-bg">
      <div class="hero-gradient"></div>
      <div class="hero-particles" aria-hidden="true"></div>
    </div>

    <div class="container">
      <div class="hero-content js-scroll">
        <h1 class="hero-title">Rekber Aman & Terpercaya</h1>
        <p class="hero-subtitle">
          Transaksi tanpa resiko, aman sampai selesai.
        </p>

        <div class="trust-stats">
          <div class="stat js-scroll" data-delay="0">
            <span class="stat-number" data-target="98">0</span>%
            <span class="stat-label">Customer Puas</span>
          </div>
          <div class="stat js-scroll" data-delay="200">
            <span class="stat-number" data-target="500">0</span>+
            <span class="stat-label">Transaksi</span>
          </div>
          <div class="stat js-scroll" data-delay="400">
            <span class="stat-number" data-target="100">0</span>%
            <span class="stat-label">Aman</span>
          </div>
        </div>

        <div class="hero-buttons js-scroll" data-delay="600">
          <a href="rekber.html" class="btn-primary">Gunakan Rekber</a>
          <a href="testi.html" class="btn-secondary">Lihat Testimoni</a>
        </div>
      </div>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
